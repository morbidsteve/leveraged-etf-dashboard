services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: leveraged-etf-dashboard:latest
    container_name: leveraged-etf-dashboard
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    # Uncomment if you want to pass through optional API keys.
    # env_file:
    #   - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/quote?symbol=SOXL"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
