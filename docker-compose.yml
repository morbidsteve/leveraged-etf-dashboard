services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: leveraged-etf-dashboard:latest
    container_name: leveraged-etf-dashboard
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Schwab OAuth credentials. If a `.env` file exists next to this
      # compose file, Compose substitutes its values here. If a var is
      # unset, the container sees an empty string and the Schwab OAuth
      # routes return 503 with a clear "not configured" message.
      - SCHWAB_CLIENT_ID=${SCHWAB_CLIENT_ID:-}
      - SCHWAB_CLIENT_SECRET=${SCHWAB_CLIENT_SECRET:-}
      - SCHWAB_REDIRECT_URI=${SCHWAB_REDIRECT_URI:-}
      - SCHWAB_TOKEN_ENCRYPTION_KEY=${SCHWAB_TOKEN_ENCRYPTION_KEY:-}
      - SCHWAB_ACCOUNT_HASH=${SCHWAB_ACCOUNT_HASH:-}
      # Server-side order guardrails (defense in depth)
      - SCHWAB_MAX_ORDER_NOTIONAL=${SCHWAB_MAX_ORDER_NOTIONAL:-}
      - SCHWAB_MAX_ORDERS_PER_DAY=${SCHWAB_MAX_ORDERS_PER_DAY:-}
      - SCHWAB_SYMBOL_ALLOWLIST=${SCHWAB_SYMBOL_ALLOWLIST:-}
    volumes:
      # Persists encrypted Schwab tokens across rebuilds.
      - dashboard-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/quote?symbol=SOXL"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  dashboard-data:
